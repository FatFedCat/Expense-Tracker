<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход - Expense Tracker</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>

  <main class="authentication-page" id="login-main">

    <div class="login-container">
      <div class="login-inner">
        <h2 class="login-title-container">Вход</h2>
        <section class="left-panel-login">
          <a href="#" class="login btn-google">Google</a>
          <a href="#" class="login btn-vk">VK</a>
          <a href="#" class="login btn-tg">Telegram</a>
        </section>

        <section class="login-section">
          <form action="login.html" method="post">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Вход</button>
          </form>
          <a href="calculator.html">Продолжить без входа</a>
        </section>
        </div>
      </div>

    <div class="register-container">
      <div class="register-inner">
        <h2 class="register-title-container">Регистрация</h2>
        <section class="left-panel-login">
          <a href="#" class="register btn-google">Google</a>
          <a href="#" class="register btn-vk">VK</a>
          <a href="#" class="register btn-tg">Telegram</a>  
        </section>

        <section class="register-section">
          <form action="register.html" method="post">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" required>
            <button type="submit">Регистрация</button>
          </form>
          <a href="calculator.html">Продолжить без регистрации</a>
        </section>
      </div>
    </div>

  </main>
</body>
</html>
