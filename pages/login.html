<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход - Expense Tracker</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

  <main class="authentication-page" id="login-main" data-testid="auth-page">
    <span id="login-view"></span>
    <span id="register-view"></span>

    <div class="login-container" data-testid="login-container">
      <div class="login-inner">
        <h2 class="login-title-container">Вход</h2>
        <section class="left-panel-login">
          <a href="#" class="login btn-google"><img src="../files/icons/google.png" alt="Google"></a>
          <a href="#" class="login btn-vk"><img src="../files/icons/vk.svg" alt="VK"></a>
          <a href="#" class="login btn-tg"><img src="../files/icons/telegram.png" alt="Telegram"> </a>
        </section>

        <section class="login-section">
          <form action="login.html" method="post" data-testid="login-form">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" name="email" required data-testid="login-email-input">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" name="password" required data-testid="login-password-input">
            <button type="submit" class="btn" data-testid="login-submit-button">Вход</button>   
          </form>
          <a href="#register-view" class="btn register-link" data-testid="go-to-register-link">Зарегистрироваться</a>
        </section>
        </div>
      </div>

    <div class="register-container" data-testid="register-container">
      <div class="register-inner">
        <h2 class="register-title-container">Регистрация</h2>
        <section class="left-panel-login">
          <a href="#" class="login btn-google"><img src="../files/icons/google.png" alt="Google"></a>
          <a href="#" class="register btn-vk"><img src="../files/icons/vk.svg" alt="VK"></a>
          <a href="#" class="register btn-tg"><img src="../files/icons/telegram.png" alt="Telegram"> </a>  
        </section>

        <section class="register-section">
          <form action="register.html" method="post" data-testid="register-form">
            <label for="register-name">Name</label>
            <input type="text" id="register-name" name="name" required data-testid="register-name-input">
            <label for="register-email">Email</label>
            <input type="email" id="register-email" name="email" required data-testid="register-email-input">
            <label for="register-password">Password</label>
            <input type="password" id="register-password" name="password" required data-testid="register-password-input">
            <label for="register-confirm-password">Confirm Password</label>
            <input type="password" id="register-confirm-password" name="confirm-password" required data-testid="register-confirm-password-input">
            <button type="submit" class="btn" data-testid="register-submit-button">Регистрация</button>
          </form>
          <a href="#login-view" class="btn register-link" data-testid="go-to-login-link">Уже есть аккаунт? Войти</a>
          <a href="calculator.html" class="btn" data-testid="continue-without-auth-link">Продолжить без регистрации</a>
        </section>
      </div>
    </div>

  </main>
</body>
</html>
