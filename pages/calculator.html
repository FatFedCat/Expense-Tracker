<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор - Expense Tracker</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header" id="site-header">
    <div class="container site-header-inner">
      <a class="site-header-logo" id="site-logo" href="../index.html">Expense Tracker</a>
      <nav class="site-header_nav" id="site-nav">
        <a href="login.html" class="btn">Вход/Регистрация</a>
      </nav>
    </div>
  </header>

  <main class="container page" id="calculator-main" data-testid="calculator-page">

    <h1 class="calculator-title">Калькулятор</h1>

    <div class="calculator-container">
      <div class="calculator-inner">
        <h2 class="calculator-title-inner">Калькулятор</h2>
        <div class="calculator-content">

          <section class="calculator-section-income">
            <label for="income-input">Доход</label>
            <input type="number" id="income-input" placeholder="Сумма" data-testid="income-input">
          </section>

          <section class="calculator-section-expenses">
            <section class="calculator-buttons">
              <button type="submit" id="add-expense" class="btn" data-testid="add-expense-button">+</button>
              <button type="submit" id="subtract-expense" class="btn" data-testid="subtract-expense-button">-</button>
            </section>
            <label for="expenses-input">Расходы</label>
            <input type="number" id="expenses-input" placeholder="Сумма" data-testid="expenses-input">
            <select name="expense-category" id="expense-category-select" data-testid="expense-category-select">
              <option value="1">Еда</option>
              <option value="2">Транспорт</option>
              <option value="3">Жилье</option>
              <option value="4">Коммунальные услуги</option>
              <option value="5">Образование</option>
              <option value="6">Здоровье</option>
              <option value="7">Развлечения</option>
              <option value="8">Одежда</option>
              <option value="9">Другое</option>              
            </select>

          </section>
          <button type="submit" id="create-report" class="btn btn-analyze" data-testid="analyze-button">Проанализировать</button>
        </div>
      </div>

      <div class="analystics-inner">
        <h2 class="analystics-title">Аналитика</h2>
        <div class="analystics-content">

          <section class="diagram-analystics">
            <p>Тут будет диаграмма</p>
          </section>

          <section class="number-analystics">
            <p>Сумма доходов: <span id="income-total" data-testid="income-total">0</span></p>
            <p>Сумма расходов: <span id="expenses-total" data-testid="expenses-total">0</span></p>
          </section>
          
          <section class="text-analystics">
            <p>Тут будут даны советы по остатку</p>
            <p>Остаток: <span id="balance-total" data-testid="balance-total">0</span></p>
          </section>

          <section class="button-analystics">
            <button type="submit" class="btn" data-testid="create-report-button">Создать отчёт</button>
          </section>
        </div>
      </div>
    </div>

  </main>
  <footer class="site-footer" id="site-footer">
    <div class="container site-footer-inner">
      <p>Expense Tracker - приложение для управления финансами</p>
    </div>
  </footer>
</body>
</html>
