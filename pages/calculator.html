<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор - Expense Tracker</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
  <header class="site-header" id="site-header">
    <div class="container site-header-inner">
      <a class="site-header-logo" id="site-logo" href="../index.html">Expense Tracker</a>
      <nav class="site-header_nav" id="site-nav">
        <a href="login.html">Вход/Регистрация</a>
      </nav>
    </div>
  </header>

  <main class="container page" id="calculator-main">

    <h1 class="calculator-title">Калькулятор</h1>

    <div class="calculator-container">
      <div class="calculator-inner">
        <h2 class="calculator-title-inner">Калькулятор</h2>
        <div class="calculator-content">

          <section class="calculator-section-income">
            <label for="income">Доход</label>
            <input type="number" id="income" placeholder="Сумма">
          </section>

          <section class="calculator-section-expenses">
            <section class="calculator-buttons">
              <button type="submit" id="add-expense">+</button>
              <button type="submit" id="subtract-expense">-</button>
            </section>
            <label for="expenses">Расходы</label>
            <input type="number" id="expenses" placeholder="Сумма">
            <select name="expenses" id="expenses">
              <option value="1">Еда</option>
              <option value="2">Транспорт</option>
              <option value="3">Жилье</option>
              <option value="4">Коммунальные услуги</option>
              <option value="5">Образование</option>
              <option value="6">Здоровье</option>
              <option value="7">Развлечения</option>
              <option value="8">Одежда</option>
              <option value="9">Другое</option>              
            </select>

          </section>
          <button type="submit" id="create-report">Проанализировать</button>
        </div>
      </div>

      <div class="analystics-inner">
        <h2 class="analystics-title">Аналитика</h2>
        <div class="analystics-content">

          <section class="diagram-analystics">
            <p>Тут будет диаграмма</p>
          </section>

          <section class="number-analystics">
            <p>Сумма доходов: <span id="income">0</span></p>
            <p>Сумма расходов: <span id="expenses">0</span></p>
          </section>
          
          <section class="text-analystics">
            <p>Тут будут даны советы по остатку</p>
            <p>Остаток: <span id="balance">0</span></p>
          </section>

          <section class="button-analystics">
            <button type="submit">Создать отчёт</button>
          </section>
        </div>
      </div>
    </div>

  </main>
  <footer class="site-footer" id="site-footer">
    <div class="container site-footer-inner">
      <p>Expense Tracker - приложение для управления финансами</p>
    </div>
  </footer>
</body>
</html>
